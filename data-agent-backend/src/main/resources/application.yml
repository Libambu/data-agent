server:
  # 后端服务端口；前端 vite proxy 的 target 是 http://localhost:9933，必须保持一致
  port: 9933

spring:
  application:
    # 当前 Spring Boot 应用的名字
    name: data-agent-backend

  # PostgreSQL 数据源；业务表（db_table / db_column / 知识库等）和向量库（pgvector）共用同一个实例
  datasource:
    url: jdbc:postgresql://localhost:5432/data_agent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  ai:
    # OpenAI 兼容接口配置；这里实际接的是阿里云 DashScope 的 OpenAI 兼容模式
    openai:
      # DashScope 的 API Key
      api-key: "sk-b505ed844af34120b70357dab398b637"
      # DashScope OpenAI 兼容模式的请求地址
      base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

      # 聊天模型配置
      chat:
        options:
          # 默认聊天模型，给 ChatModel / ChatClient 使用
          model: deepseek-v4-pro

      # 向量模型配置
      embedding:
        options:
          # 文本转向量使用的模型
          model: text-embedding-v4
          # 向量维度；text-embedding-v4 使用 1024 维（pgvector HNSW 索引上限是 2000，不能超过）
          dimensions: 1024

    # Spring AI 向量数据库配置：使用 PostgreSQL 的 pgvector 扩展
    vectorstore:
      pgvector:
        # 启动项目时自动创建 pgvector 扩展、表与索引
        initialize-schema: true
        # 索引类型：HNSW 相比 IVF_FLAT 在召回率和速度间更平衡
        index-type: HNSW
        # 向量距离度量：和 Spring AI 默认一致，使用余弦距离
        distance-type: COSINE_DISTANCE
        # 必须与上面 embedding.dimensions 一致；如更换嵌入模型需先 DROP TABLE vector_store 再重启
        dimensions: 1024
        # pgvector 表名前缀（Spring AI 会创建 vector_store 表）
        schema-name: public
        table-name: vector_store

# MyBatis 配置
mybatis:
  # mapper XML 位置
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类别名扫描包，方便 XML 里直接写短类名
  type-aliases-package: com.libambu.dataagent.entity.dataset
  configuration:
    # 数据库列 user_name -> 实体字段 userName
    map-underscore-to-camel-case: true

logging:
  level:
    # 打开你自己 advisor 包下面的 debug 日志，方便排查 Spring AI 调用过程
    com.libambu.dataagent.advisor: debug